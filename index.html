<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ohai~</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

  :root {
    --bg:     #0d0d0f;
    --bg2:    #131316;
    --bg3:    #1a1a1f;
    --line:   #2a2a32;
    --dim:    #3a3a46;
    --muted:  #5a5a6e;
    --text:   #c8c8d8;
    --soft:   #9090a8;
    --accent: #7eb8b0;
    --purple: #b07eb8;
    --them:   #e8e0d0;
    --you:    #b0c8b8;
    --glow:   rgba(126,184,176,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier Prime', monospace;
    font-size: 15px;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 720px;
    margin: 0 auto;
  }

  /* ── header ── */
  #header {
    padding: 14px 20px 12px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-shrink: 0;
  }

  #roomname {
    font-family: 'VT323', monospace;
    font-size: 28px;
    color: var(--accent);
    letter-spacing: 1px;
    text-shadow: 0 0 20px rgba(126,184,176,0.35);
  }

  #status {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 5px;
    vertical-align: middle;
    animation: pulse 2.6s ease-in-out infinite;
    box-shadow: 0 0 6px var(--accent);
  }

  .dot.offline {
    background: var(--dim);
    box-shadow: none;
    animation: none;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.25; }
  }

  #spine-arc {
    margin-left: auto;
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: var(--dim);
    letter-spacing: 2px;
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-align: right;
    transition: color 0.4s;
  }

  #spine-arc.at-g { color: var(--accent); }

  /* ── messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 4px;
    display: flex;
    flex-direction: column;
  }

  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  .sys-line {
    text-align: center;
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 0 20px;
    flex-shrink: 0;
  }

  .msg {
    display: flex;
    flex-direction: column;
    margin-bottom: 1px;
    flex-shrink: 0;
    animation: fadein 0.18s ease-out both;
  }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.new-group    { margin-top: 16px; }
  .msg.continuation .msg-header { display: none; }

  .msg-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 0 2px 2px;
  }

  .msg-name { font-size: 12px; font-weight: 700; letter-spacing: 0.5px; }
  .msg-name.left  { color: var(--purple); }
  .msg-name.right { color: var(--accent); }

  .msg-time { font-size: 11px; color: var(--dim); }

  /* spine badge beside ohai's name */
  .spine-pos {
    font-family: 'VT323', monospace;
    font-size: 13px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  .msg-body {
    padding: 6px 11px;
    border-radius: 2px;
    line-height: 1.58;
    max-width: 84%;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .msg.left  .msg-body {
    align-self: flex-start;
    background: var(--bg3);
    color: var(--them);
    border-left: 2px solid var(--purple);
  }

  .msg.right .msg-body {
    align-self: flex-end;
    background: var(--bg2);
    color: var(--you);
    border-right: 2px solid var(--accent);
  }

  /* G-state glow on their bubble */
  .msg.left.at-g .msg-body {
    border-left-color: var(--accent);
    box-shadow: -2px 0 12px rgba(126,184,176,0.15);
  }

  /* typing indicator */
  #typing {
    min-height: 26px;
    padding: 4px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.25s;
    flex-shrink: 0;
  }

  #typing.show { opacity: 1; }

  #typing span { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; }

  .dots { display: flex; gap: 3px; align-items: center; }
  .dots b {
    display: block;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--purple);
    animation: bdot 1.2s ease-in-out infinite;
  }
  .dots b:nth-child(2) { animation-delay: 0.2s; }
  .dots b:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bdot {
    0%,80%,100% { transform: translateY(0); opacity: 0.35; }
    40%         { transform: translateY(-4px); opacity: 1; }
  }

  /* ── input ── */
  #input-wrap {
    border-top: 1px solid var(--line);
    padding: 12px 20px 16px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    flex-shrink: 0;
  }

  #you-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.5px;
    padding-bottom: 7px;
    white-space: nowrap;
  }

  #msg-input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: 2px;
    color: var(--text);
    font-family: 'Courier Prime', monospace;
    font-size: 15px;
    padding: 7px 11px;
    resize: none;
    min-height: 36px;
    max-height: 120px;
    line-height: 1.5;
    outline: none;
    overflow-y: auto;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #msg-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 10px var(--glow);
  }

  #msg-input::placeholder { color: var(--dim); }
  #msg-input:disabled { opacity: 0.4; cursor: not-allowed; }

  #send-btn {
    background: none;
    border: 1px solid var(--dim);
    border-radius: 2px;
    color: var(--soft);
    font-family: 'VT323', monospace;
    font-size: 18px;
    padding: 5px 14px 4px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    align-self: flex-end;
  }

  #send-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 10px var(--glow);
  }

  #send-btn:active { transform: translateY(1px); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="roomname">ohai~</div>
    <div id="status">
      <span class="dot" id="dot"></span>
      <span id="status-text">connecting...</span>
    </div>
    <div id="spine-arc"></div>
  </div>

  <div id="messages">
    <div class="sys-line">— private room —</div>
  </div>

  <div id="typing">
    <span>ohai is thinking</span>
    <div class="dots"><b></b><b></b><b></b></div>
  </div>

  <div id="input-wrap">
    <div id="you-label">you:</div>
    <textarea id="msg-input" placeholder="say something..." rows="1" disabled></textarea>
    <button id="send-btn" disabled>send</button>
  </div>

</div>

<script>
const SERVER = 'http://127.0.0.1:7700';

let lastSender  = null;
let arcPositions = [];
let waiting     = false;

// ── clock ─────────────────────────────────────────────────────────────────────
function t() {
  return new Date().toLocaleTimeString('en-US',
    {hour:'2-digit', minute:'2-digit', hour12: false});
}

// ── escape ────────────────────────────────────────────────────────────────────
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── scroll ────────────────────────────────────────────────────────────────────
function scrollDown() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

// ── post message ──────────────────────────────────────────────────────────────
function post(side, text, meta = {}) {
  const msgs  = document.getElementById('messages');
  const isNew = side !== lastSender;
  lastSender  = side;

  const name = side === 'you' ? 'you' : 'ohai';

  // spine badge for ohai
  let badge = '';
  if (side === 'ohai' && meta.position) {
    badge = `<span class="spine-pos">${meta.position}</span>`;
  }

  const div = document.createElement('div');
  div.className = [
    'msg',
    side === 'you' ? 'right' : 'left',
    isNew ? 'new-group' : 'continuation',
    meta.at_g ? 'at-g' : '',
  ].filter(Boolean).join(' ');

  div.innerHTML = `
    <div class="msg-header">
      <span class="msg-name ${side === 'you' ? 'right' : 'left'}">${name}</span>
      ${badge}
      <span class="msg-time">${t()}</span>
    </div>
    <div class="msg-body">${esc(text)}</div>
  `;

  msgs.appendChild(div);
  scrollDown();
}

function sysLine(text) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'sys-line';
  d.textContent = text;
  msgs.appendChild(d);
  scrollDown();
}

// ── typing indicator ──────────────────────────────────────────────────────────
function setTyping(on) {
  document.getElementById('typing').classList.toggle('show', on);
  if (on) scrollDown();
}

// ── spine arc ──────────────────────────────────────────────────────────────────
function pushArc(pos) {
  arcPositions.push(pos);
  const el = document.getElementById('spine-arc');
  el.textContent = arcPositions.slice(-9).join('→');
  el.classList.toggle('at-g', pos === 'G');
}

// ── connection check ──────────────────────────────────────────────────────────
async function checkServer() {
  try {
    const r = await fetch(`${SERVER}/state`, {signal: AbortSignal.timeout(2000)});
    if (r.ok) {
      const data = await r.json();
      setOnline(true, data);
      return true;
    }
  } catch (_) {}
  setOnline(false);
  return false;
}

function setOnline(online, data = null) {
  document.getElementById('dot').className = online ? 'dot' : 'dot offline';
  document.getElementById('status-text').textContent =
    online ? 'private room · ohai is here' : 'server offline';
  document.getElementById('msg-input').disabled  = !online;
  document.getElementById('send-btn').disabled   = !online;
  if (online) document.getElementById('msg-input').focus();
}

// ── send ──────────────────────────────────────────────────────────────────────
async function send() {
  if (waiting) return;
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';

  post('you', text);

  waiting = true;
  input.disabled       = true;
  document.getElementById('send-btn').disabled = true;

  // thinking delay — feels present, not instant
  const delay = 500 + Math.random() * 700 + Math.min(text.length * 8, 800);
  setTyping(true);
  await sleep(delay);

  let data;
  try {
    const res = await fetch(`${SERVER}/breathe`, {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({message: text}),
    });
    data = await res.json();
  } catch (err) {
    setTyping(false);
    sysLine('— signal dropped —');
    waiting = false;
    setOnline(false);
    return;
  }

  setTyping(false);

  if (data.reply) {
    pushArc(data.position || 'C');
    post('ohai', data.reply, {
      position: data.position,
      at_g:     data.has_g || data.position === 'G',
    });
  }

  waiting = false;
  input.disabled = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── input events ──────────────────────────────────────────────────────────────
const input = document.getElementById('msg-input');

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

document.getElementById('send-btn').addEventListener('click', send);

// ── boot ──────────────────────────────────────────────────────────────────────
(async () => {
  const online = await checkServer();
  if (!online) {
    sysLine('— start ohai_server.py to connect —');
    // retry every 3s until connected
    const poll = setInterval(async () => {
      const ok = await checkServer();
      if (ok) {
        clearInterval(poll);
        sysLine('— ohai connected —');
      }
    }, 3000);
  }
})();
</script>
</body>
</html>
