<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ohai~</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

  :root {
    --bg:     #0d0d0f;
    --bg2:    #131316;
    --bg3:    #1a1a1f;
    --line:   #2a2a32;
    --dim:    #3a3a46;
    --muted:  #5a5a6e;
    --text:   #c8c8d8;
    --soft:   #9090a8;
    --accent: #7eb8b0;
    --them:   #e8e0d0;
    --you:    #b0c8b8;
    --glow:   rgba(126,184,176,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier Prime', monospace;
    font-size: 15px;
    overflow: hidden;
  }

  /* scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.06) 2px,
      rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 720px;
    margin: 0 auto;
  }

  /* ── header ── */
  #header {
    padding: 14px 20px 12px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-shrink: 0;
  }

  #roomname {
    font-family: 'VT323', monospace;
    font-size: 28px;
    color: var(--accent);
    letter-spacing: 1px;
    text-shadow: 0 0 20px rgba(126,184,176,0.35);
  }

  #status {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  #status .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 5px;
    vertical-align: middle;
    animation: pulse 2.6s ease-in-out infinite;
    box-shadow: 0 0 6px var(--accent);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.25; }
  }

  #clock {
    margin-left: auto;
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  /* ── messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 4px;
    display: flex;
    flex-direction: column;
  }

  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  .system-line {
    text-align: center;
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 0 20px;
    flex-shrink: 0;
  }

  /* message block */
  .msg {
    display: flex;
    flex-direction: column;
    margin-bottom: 1px;
    flex-shrink: 0;
    animation: fadein 0.18s ease-out both;
  }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.new-group { margin-top: 16px; }

  .msg-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 0 2px 2px;
  }

  .msg.continuation .msg-header { display: none; }

  .msg-name {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .msg-name.left  { color: #b07eb8; }
  .msg-name.right { color: var(--accent); }

  .msg-time {
    font-size: 11px;
    color: var(--dim);
  }

  .msg-body {
    padding: 6px 11px;
    border-radius: 2px;
    line-height: 1.58;
    max-width: 84%;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .msg.left  .msg-body {
    align-self: flex-start;
    background: var(--bg3);
    color: var(--them);
    border-left: 2px solid #b07eb8;
  }

  .msg.right .msg-body {
    align-self: flex-end;
    background: var(--bg2);
    color: var(--you);
    border-right: 2px solid var(--accent);
  }

  /* ── input ── */
  #input-wrap {
    border-top: 1px solid var(--line);
    padding: 12px 20px 16px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    flex-shrink: 0;
  }

  #who-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.5px;
    padding-bottom: 7px;
    white-space: nowrap;
  }

  #msg-input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--line);
    border-radius: 2px;
    color: var(--text);
    font-family: 'Courier Prime', monospace;
    font-size: 15px;
    padding: 7px 11px;
    resize: none;
    min-height: 36px;
    max-height: 120px;
    line-height: 1.5;
    outline: none;
    overflow-y: auto;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #msg-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 10px var(--glow);
  }

  #msg-input::placeholder { color: var(--dim); }

  #send-btn {
    background: none;
    border: 1px solid var(--dim);
    border-radius: 2px;
    color: var(--soft);
    font-family: 'VT323', monospace;
    font-size: 18px;
    padding: 5px 14px 4px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    align-self: flex-end;
  }

  #send-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 10px var(--glow);
  }

  #send-btn:active { transform: translateY(1px); }

  /* ── name switcher ── */
  #switcher {
    padding: 0 20px 10px;
    display: flex;
    gap: 6px;
    align-items: center;
    flex-shrink: 0;
  }

  #switcher span {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .side-btn {
    font-family: 'VT323', monospace;
    font-size: 15px;
    padding: 2px 10px;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 1px;
    border: 1px solid var(--dim);
    background: none;
    color: var(--muted);
    transition: all 0.15s;
  }

  .side-btn.active-you {
    border-color: var(--accent);
    color: var(--accent);
  }

  .side-btn.active-them {
    border-color: #b07eb8;
    color: #b07eb8;
  }

  .side-btn:hover { opacity: 0.8; }
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="roomname">ohai~</div>
    <div id="status"><span class="dot"></span>private room</div>
    <div id="clock"></div>
  </div>

  <div id="messages">
    <div class="system-line">— you entered the room —</div>
  </div>

  <div id="switcher">
    <span>sending as</span>
    <button class="side-btn active-you" id="btn-you" onclick="setSide('you')">you</button>
    <button class="side-btn" id="btn-them" onclick="setSide('them')">ohai</button>
  </div>

  <div id="input-wrap">
    <div id="who-label">you:</div>
    <textarea id="msg-input" placeholder="say something..." rows="1" autofocus></textarea>
    <button id="send-btn">send</button>
  </div>

</div>

<script>
  // ── state ──────────────────────────────────────────────────────────────────
  let currentSide = 'you';   // 'you' | 'them'
  let lastSide    = null;

  // ── clock ──────────────────────────────────────────────────────────────────
  function tick() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', hour12:false});
  }
  tick();
  setInterval(tick, 10000);

  // ── side switcher ──────────────────────────────────────────────────────────
  function setSide(side) {
    currentSide = side;
    document.getElementById('who-label').textContent = side === 'you' ? 'you:' : 'ohai:';
    document.getElementById('btn-you').className  = 'side-btn' + (side === 'you'  ? ' active-you'  : '');
    document.getElementById('btn-them').className = 'side-btn' + (side === 'them' ? ' active-them' : '');
    document.getElementById('msg-input').focus();
  }

  // ── post message ───────────────────────────────────────────────────────────
  function post(side, text) {
    const msgs    = document.getElementById('messages');
    const isNew   = side !== lastSide;
    lastSide      = side;

    const name = side === 'you' ? 'you' : 'ohai';
    const t    = new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', hour12:false});

    const div = document.createElement('div');
    div.className = `msg ${side === 'you' ? 'right' : 'left'} ${isNew ? 'new-group' : 'continuation'}`;
    div.innerHTML = `
      <div class="msg-header">
        <span class="msg-name ${side === 'you' ? 'right' : 'left'}">${name}</span>
        <span class="msg-time">${t}</span>
      </div>
      <div class="msg-body">${esc(text)}</div>
    `;

    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function esc(s) {
    return s
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;');
  }

  // ── send ───────────────────────────────────────────────────────────────────
  function send() {
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if (!text) return;

    post(currentSide, text);

    input.value = '';
    input.style.height = 'auto';
    input.focus();
  }

  // ── input events ───────────────────────────────────────────────────────────
  const input = document.getElementById('msg-input');

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  document.getElementById('send-btn').addEventListener('click', send);
</script>
</body>
</html>
