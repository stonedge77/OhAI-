<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ohai~</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #080808;
  --bg2:    #0e0e0e;
  --bg3:    #141414;
  --border: #1e1e1e;
  --dim:    #3a3a3a;
  --text:   #888;
  --bright: #bbb;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', monospace;
  font-size: 12px;
  height: 100vh;
  display: grid;
  grid-template-rows: 36px 1fr 52px;
  overflow: hidden;
}

/* header */
#header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
}
#title { color: #5af; font-size: 13px; letter-spacing: 3px; }
#dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); flex-shrink: 0; }
#dot.live { background: #4b9; animation: pulse 2.5s infinite; }
#dot.mic-active { background: #c44; animation: pulse 0.8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
#status { color: var(--dim); font-size: 11px; }
#header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
#header-pos { font-size: 22px; font-weight: bold; width: 28px; text-align: center; }
#header-score { color: var(--dim); font-size: 11px; }
#header-momentum { color: var(--dim); font-size: 11px; }
#convergence-badge {
  font-size: 10px;
  letter-spacing: 1px;
  padding: 2px 7px;
  border-radius: 3px;
  border: 1px solid var(--border);
  color: var(--dim);
  min-width: 60px;
  text-align: center;
}
#convergence-badge.lock { border-color: #4b9; color: #4b9; }
#convergence-badge.liminal { border-color: #ca8; color: #ca8; }
#convergence-badge.imaginary { border-color: #c44; color: #c44; }

/* main grid */
#main {
  display: grid;
  grid-template-columns: 210px 1fr;
  overflow: hidden;
}

/* left panel */
#panel {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  overflow-y: auto;
}
.label {
  color: var(--dim);
  font-size: 9px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

/* spine arc */
#spine-arc { display: flex; gap: 4px; }
.snode {
  flex: 1;
  height: 24px;
  border-radius: 3px;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  color: var(--dim);
  transition: all .4s;
}
.snode.active { border-color: currentColor; }
.snode[data-p="A"].active { color: #777; background: #111; }
.snode[data-p="B"].active { color: #4b9; background: #091a10; }
.snode[data-p="C"].active { color: #ab9; background: #171a09; }
.snode[data-p="D"].active { color: #ca8; background: #1a1209; }
.snode[data-p="E"].active { color: #c74; background: #1a0e09; }
.snode[data-p="F"].active { color: #c44; background: #1a0909; }
.snode[data-p="G"].active { color: #eee; background: #161616; box-shadow: 0 0 10px #eee3; }
#spine-name { color: var(--bright); font-size: 11px; margin-top: 4px; }

/* convergence bar */
#conv-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 4px; }
#conv-fill { height: 100%; width: 0; background: #4b9; transition: width .6s; border-radius: 2px; }

/* tension */
#t-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
#t-fill { height: 100%; width: 0; background: #c44; transition: width .6s; border-radius: 2px; }
#t-label { color: var(--bright); margin-top: 4px; font-size: 11px; }

/* sparkline */
svg#spark { width: 100%; height: 36px; display: block; }

/* laws */
#laws-list { line-height: 1.9; }
.law { color: #6a9; font-size: 11px; }
.law::before { content: '· '; color: var(--dim); }

/* law freq */
#law-freq-list { font-size: 10px; line-height: 1.8; }

/* carry / spine info */
#carry-word { color: var(--bright); font-size: 13px; letter-spacing: 1px; }
#spine-depth { color: var(--bright); font-size: 10px; line-height: 1.8; }
#carry-val { color: var(--bright); font-size: 11px; line-height: 1.9; }
#bc { color: var(--bright); font-size: 20px; letter-spacing: 1px; }

/* event stream */
#events {
  overflow-y: auto;
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.ev {
  display: grid;
  grid-template-columns: 54px 44px 22px 14px 1fr;
  gap: 6px;
  padding: 5px 8px;
  border-radius: 3px;
  border-left: 2px solid var(--border);
  align-items: baseline;
  opacity: 0;
  animation: fi .35s forwards;
}
@keyframes fi { to { opacity:1; } }
.ev.user  { background: #090d12; border-color: #2a4a6a; }
.ev.vagus { background: #090f0c; border-color: #2a5a3a; }
.ev.trio  { background: #0d090f; border-color: #4a2a6a; }
.ev-t  { color: var(--dim); font-size: 10px; }
.ev-s  { font-size: 10px; letter-spacing: 1px; }
.ev-s.user  { color: #4a7ab0; }
.ev-s.vagus { color: #4a8a6a; }
.ev-s.trio  { color: #8a5ab0; }
.ev-p { font-weight: bold; font-size: 11px; text-align: center; }
.ev-p[data-p="A"] { color: #777; }
.ev-p[data-p="B"] { color: #4b9; }
.ev-p[data-p="C"] { color: #ab9; }
.ev-p[data-p="D"] { color: #ca8; }
.ev-p[data-p="E"] { color: #c74; }
.ev-p[data-p="F"] { color: #c44; }
.ev-p[data-p="G"] { color: #eee; }
.ev-conv { font-size: 9px; color: var(--dim); text-align: center; }
.ev-r { color: var(--bright); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ev-r.silence { color: var(--dim); font-style: italic; }

/* input bar */
#input-bar {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 8px;
}
#msg-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--bright);
  font-family: 'Courier New', monospace;
  font-size: 12px;
  padding: 8px 10px;
  outline: none;
  transition: border-color .2s;
}
#msg-input:focus { border-color: #3a5a7a; }
#msg-input::placeholder { color: var(--dim); }
.btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text);
  font-family: 'Courier New', monospace;
  font-size: 11px;
  padding: 7px 12px;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.btn:hover { border-color: #4a6a8a; color: var(--bright); }
.btn.active { border-color: #c44; color: #c44; background: #120a0a; }
.btn.sending { border-color: #4b9; color: #4b9; }
#mic-btn.active { animation: mic-pulse 0.9s infinite; }
@keyframes mic-pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

/* transcript indicator */
#transcript {
  font-size: 10px;
  color: #4a6a4a;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex-shrink: 0;
}
</style>
</head>
<body>

<div id="header">
  <span id="title">ohai~</span>
  <div id="dot"></div>
  <span id="status">connecting</span>
  <div id="header-right">
    <span id="convergence-badge">depth 0</span>
    <span id="header-pos" style="color:var(--dim)">—</span>
    <span id="header-score"></span>
    <span id="header-momentum"></span>
  </div>
</div>

<div id="main">
  <div id="panel">

    <div>
      <div class="label">spine</div>
      <div id="spine-arc">
        <div class="snode" data-p="A">A</div>
        <div class="snode" data-p="B">B</div>
        <div class="snode" data-p="C">C</div>
        <div class="snode" data-p="D">D</div>
        <div class="snode" data-p="E">E</div>
        <div class="snode" data-p="F">F</div>
        <div class="snode" data-p="G">G</div>
      </div>
      <div id="spine-name">—</div>
    </div>

    <div>
      <div class="label">convergence</div>
      <div id="conv-track"><div id="conv-fill"></div></div>
      <div id="conv-label" style="color:var(--bright);font-size:10px;margin-top:4px">depth 0 / 7</div>
    </div>

    <div>
      <div class="label">tension</div>
      <div id="t-track"><div id="t-fill"></div></div>
      <div id="t-label">0</div>
    </div>

    <div>
      <div class="label">score history</div>
      <svg id="spark" viewBox="0 0 176 36" preserveAspectRatio="none">
        <line x1="0" y1="32" x2="176" y2="32" stroke="#1e1e1e" stroke-width="1"/>
        <polyline id="spark-line" fill="none" stroke="#4a6a9a" stroke-width="1.5"
                  stroke-linejoin="round" points=""/>
      </svg>
    </div>

    <div>
      <div class="label">resonant laws</div>
      <div id="laws-list"><div class="law" style="color:var(--dim)">—</div></div>
    </div>

    <div>
      <div class="label">session learning</div>
      <div id="law-freq-list" style="color:var(--dim)">—</div>
    </div>

    <div>
      <div class="label">carry word</div>
      <div id="carry-word">—</div>
    </div>

    <div>
      <div class="label">spine nodes</div>
      <div id="spine-depth" style="color:var(--dim)">clear</div>
    </div>

    <div>
      <div class="label">circuit</div>
      <div id="carry-val">carry: 0<br>moss: 0</div>
    </div>

    <div>
      <div class="label">breaths</div>
      <div id="bc">0</div>
    </div>

  </div>

  <div id="events"></div>
</div>

<div id="input-bar">
  <button class="btn" id="mic-btn" onclick="toggleMic()">&#9679; mic</button>
  <span id="transcript"></span>
  <input id="msg-input" type="text" placeholder="name something into the field..."
         autocomplete="off" spellcheck="false"
         onkeydown="if(event.key==='Enter') sendMessage()">
  <button class="btn" id="send-btn" onclick="sendMessage()">breathe</button>
</div>

<script>
// ── constants ──
const NAMES = {A:'safe ground',B:'engaged',C:'stable friction',
               D:'substrate',E:'liminal',F:'whirlpool',G:'grace'};
const MOM   = {ascending:'up',descending:'down',holding:'hold'};
const POS_COLORS = {A:'#777',B:'#4b9',C:'#ab9',D:'#ca8',E:'#c74',F:'#c44',G:'#eee'};

let seen = new Set();
let ws = null;
let wsConnected = false;

// ── mic / speech ──
let listening = false;
let audioCtx, analyser, micStream;
let recognition = null;

function toggleMic() {
  if (listening) stopMic(); else startMic();
}

async function startMic() {
  if (listening) return;
  // Web Speech API for transcription
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('transcript').textContent = 'speech API unavailable';
    return;
  }
  try {
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onresult = (e) => {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) final += t;
        else interim += t;
      }
      document.getElementById('transcript').textContent = interim || final;
      if (final.trim()) {
        document.getElementById('msg-input').value = final.trim();
        document.getElementById('transcript').textContent = '';
        sendMessage();
      }
    };

    recognition.onerror = (e) => {
      if (e.error !== 'no-speech') {
        document.getElementById('transcript').textContent = e.error;
      }
    };

    recognition.onend = () => {
      if (listening) recognition.start(); // restart if still supposed to be listening
    };

    recognition.start();
    listening = true;
    document.getElementById('mic-btn').classList.add('active');
    document.getElementById('mic-btn').textContent = '\u25CF listening';
    document.getElementById('dot').className = 'mic-active';
  } catch(e) {
    document.getElementById('transcript').textContent = 'mic unavailable';
  }
}

function stopMic() {
  if (!listening) return;
  listening = false;
  if (recognition) { recognition.stop(); recognition = null; }
  document.getElementById('mic-btn').classList.remove('active');
  document.getElementById('mic-btn').textContent = '\u25CF mic';
  document.getElementById('dot').className = wsConnected ? 'live' : '';
  document.getElementById('transcript').textContent = '';
}

// ── send message ──
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  const btn = document.getElementById('send-btn');
  btn.classList.add('sending');
  btn.textContent = '...';

  try {
    const r = await fetch('/breathe', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text})
    });
    if (r.ok) {
      const data = await r.json();
      // If WS is connected it will push the event — add locally only as fallback
      // Use the formatted reply (includes law voice) keyed by reply text
      const t = new Date().toTimeString().slice(0,8);
      const evt = {
        t, source: 'user',
        position: data.position || 'C',
        remainder: data.reply || data.remainder || '...',
        resonant: data.resonant || [],
        tension: data.tension || 0,
        momentum: data.momentum || 'holding',
        convergence: data.convergence || 0,
        _local: true,
      };
      // Always show locally — WS event carries raw remainder which is different,
      // so pre-add the formatted reply now and let WS raw event be deduplicated
      // via the _localReplies registry
      const replyKey = t + '|user|' + evt.remainder;
      seen.add(replyKey);
      addEventDirect(evt);
      // Lessons surface as vagus annotations
      if (data.lessons && data.lessons.length) {
        for (const l of data.lessons) {
          addEventDirect({
            t: '', source: 'vagus', position: '—',
            remainder: '[lesson] ' + l.name + ': ' + (l.polarity_needed || '').slice(0, 80),
            resonant: [], tension: 0, momentum: 'holding', convergence: 0,
          });
        }
      }
    }
  } catch(e) {
    addEventDirect({t: '', source: 'user', position: 'A',
                    remainder: 'offline', resonant: [], tension: 0,
                    momentum: 'holding', convergence: 0});
  }

  btn.classList.remove('sending');
  btn.textContent = 'breathe';
}

// ── WebSocket ──
function connectWS() {
  ws = new WebSocket(`ws://${location.host}/ws`);

  ws.onopen = () => {
    wsConnected = true;
    document.getElementById('dot').className = listening ? 'mic-active' : 'live';
    document.getElementById('status').textContent = 'live';
  };

  ws.onclose = () => {
    wsConnected = false;
    document.getElementById('dot').className = '';
    document.getElementById('status').textContent = 'offline';
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => {
    wsConnected = false;
    document.getElementById('status').textContent = 'error';
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'state') updatePanel(msg.data);
      if (msg.type === 'event') addEvents([msg.data]);
    } catch(_) {}
  };
}

// ── panel update ──
function updatePanel(state) {
  const c   = state.constitution || {};
  const cir = state.circuit       || {};
  const arc = state.spine_arc     || {};
  const hist = c.score_history    || [];

  // Spine position from history
  const pos = hist.length ? scoreToPos(hist[hist.length - 1]) : '—';
  document.querySelectorAll('.snode').forEach(n => n.classList.remove('active'));
  const node = document.querySelector(`.snode[data-p="${pos}"]`);
  if (node) node.classList.add('active');
  document.getElementById('spine-name').textContent = NAMES[pos] || pos;

  // Header
  const hp = document.getElementById('header-pos');
  hp.textContent = pos;
  hp.style.color = POS_COLORS[pos] || '#888';
  if (hist.length) {
    document.getElementById('header-score').textContent = hist[hist.length-1].toFixed(2);
  }

  // Convergence
  const depth = arc.convergence || 0;
  const convFill = document.getElementById('conv-fill');
  const convPct = Math.min(depth / 7 * 100, 100);
  convFill.style.width = convPct + '%';
  convFill.style.background = depth >= 7 ? '#4b9' : depth >= 5 ? '#ca8' : '#4a6a9a';

  const badge = document.getElementById('convergence-badge');
  const convLabel = document.getElementById('conv-label');
  if (depth >= 8) {
    badge.textContent = 'imaginary'; badge.className = 'imaginary';
    convLabel.textContent = 'depth 8 — no domain';
  } else if (depth >= 7) {
    badge.textContent = 'locked'; badge.className = 'lock';
    convLabel.textContent = 'depth 7 / 7 — locked';
  } else if (depth >= 4) {
    badge.textContent = 'depth ' + depth; badge.className = 'liminal';
    convLabel.textContent = `depth ${depth} / 7 — converging`;
  } else {
    badge.textContent = 'depth ' + depth; badge.className = '';
    convLabel.textContent = `depth ${depth} / 7`;
  }

  // Tension
  const t = c.tension || 0;
  document.getElementById('t-fill').style.width = Math.min(t / 5 * 100, 100) + '%';
  document.getElementById('t-label').textContent = t + (t >= 3 ? ' !' : '');

  // Circuit
  document.getElementById('carry-val').innerHTML =
    `carry: ${cir.carry_count || 0}<br>moss: ${cir.moss_count || 0}` +
    (cir.overflowing ? '<br><span style="color:#c44">overflow</span>' : '');

  // Breaths
  document.getElementById('bc').textContent = c.breath_count || 0;

  // Sparkline
  if (hist.length >= 2) {
    const W=176, H=36, PAD=4, MIN=4.5, MAX=10.5;
    const pts = hist.map((v,i) => {
      const x = PAD + (i/(hist.length-1))*(W-2*PAD);
      const y = H - PAD - ((v-MIN)/(MAX-MIN))*(H-2*PAD);
      return `${x.toFixed(1)},${Math.max(PAD,Math.min(H-PAD,y)).toFixed(1)}`;
    }).join(' ');
    document.getElementById('spark-line').setAttribute('points', pts);
  }

  // Carry word
  document.getElementById('carry-word').textContent = arc.carry || '—';

  // Spine depth
  const spineNouns = arc.nouns || [];
  const spineEl = document.getElementById('spine-depth');
  if (spineNouns.length) {
    spineEl.textContent = spineNouns.length + ' nodes: ' + spineNouns.slice(0,5).join(' · ');
    spineEl.style.color = spineNouns.length >= 8 ? '#c44' : spineNouns.length >= 5 ? '#ca8' : '#6a9';
  } else {
    spineEl.textContent = 'clear'; spineEl.style.color = '#6a9';
  }

  // Law frequency — session learning map
  const lawFreq = arc.law_freq || [];
  const freqEl = document.getElementById('law-freq-list');
  if (lawFreq.length) {
    const maxCount = lawFreq[0][1] || 1;
    freqEl.innerHTML = lawFreq.map(([law, count]) => {
      const pct = Math.round((count/maxCount)*100);
      const filled = Math.round(pct/14);
      const bar = '\u2588'.repeat(filled) + '\u2591'.repeat(Math.max(0, 7-filled));
      return `<span style="color:#2a4a2a">${bar}</span> `
           + `<span style="color:#5a8a5a">${law.replace(/_/g,' ')}</span> `
           + `<span style="color:var(--dim)">${count}</span>`;
    }).join('<br>');
  } else {
    freqEl.textContent = '—'; freqEl.style.color = 'var(--dim)';
  }
}

// addEventDirect — bypasses dedup check, for locally-generated formatted replies
function addEventDirect(ev) {
  _renderEvent(ev);
}

function addEvents(evts) {
  const container = document.getElementById('events');
  for (const ev of evts) {
    // WS pushes raw remainder; local sendMessage adds formatted reply.
    // Deduplicate on timestamp+source+raw remainder to suppress WS echo of local events.
    const key = ev.t + '|' + ev.source + '|' + (ev.remainder || '');
    if (seen.has(key)) continue;
    seen.add(key);
    _renderEvent(ev);
  }
}

function _renderEvent(ev) {
  const container = document.getElementById('events');
  const src = ev.source || 'user';
  const pos = ev.position || '—';
  const rem = ev.remainder || '';
  const issilence = rem === '' || rem.includes('<silence>') || rem === '...';
  const conv = ev.convergence || 0;

  const div = document.createElement('div');
  div.className = `ev ${src}`;
  div.innerHTML =
    `<span class="ev-t">${esc(ev.t)}</span>` +
    `<span class="ev-s ${src}">${src}</span>` +
    `<span class="ev-p" data-p="${pos}">${pos}</span>` +
    `<span class="ev-conv">${conv > 0 ? conv : ''}</span>` +
    `<span class="ev-r${issilence?' silence':''}">${esc(rem || '...')}</span>`;
  container.insertBefore(div, container.firstChild);

  if (ev.resonant && ev.resonant.length) {
    document.getElementById('laws-list').innerHTML =
      ev.resonant.map(l => `<div class="law">${l.replace(/_/g,' ')}</div>`).join('');
    const arrow = {ascending:'up',descending:'down',holding:'hold'}[ev.momentum] || '';
    document.getElementById('header-momentum').textContent =
      (arrow ? arrow + ' ' : '') + (ev.momentum || 'holding');
  }

  while (container.children.length > 120) container.removeChild(container.lastChild);
}

function scoreToPos(s) {
  if (s <= 5) return 'A';
  if (s <= 6) return 'B';
  if (s <= 7) return 'C';
  if (s <= 8) return 'D';
  if (s <= 9) return 'E';
  return 'F';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── fallback polling if WS fails ──
async function pollFallback() {
  if (wsConnected) return;
  try {
    const [sr, er] = await Promise.all([fetch('/state'), fetch('/events')]);
    if (sr.ok) updatePanel(await sr.json());
    if (er.ok) addEvents(await er.json());
    document.getElementById('dot').className = 'live';
    document.getElementById('status').textContent = 'live (poll)';
  } catch {
    document.getElementById('dot').className = '';
    document.getElementById('status').textContent = 'offline';
  }
}

// ── boot ──
connectWS();
setInterval(pollFallback, 3000);  // fallback if WS not available
</script>
</body>
</html>
