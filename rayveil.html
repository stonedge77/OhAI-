<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>

<canvas id="c"></canvas>
<div id="ui">

<script>
'use strict';

// Rayveil – subtractive SDF ray shells
// CC0 – no rights reserved

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });

let W=0, H=0, CX=0, CY=0, dpr=1;
const TAU = Math.PI*2;
const GOLDEN = Math.PI * (3 - Math.sqrt(5)); // ~2.39996

const core = { x:0, y:0, tx:0, ty:0 };
let rayCount = 200;
let layerCount = 5;
let rayOffset = 0;

const cutters = [];
for(let i=0;i<5;i++){
  cutters.push({
    a: i * TAU/5 + Math.random(),
    speed: (0.006 + Math.random()*0.004) * (i%2?1:-1),
    baseR: 48 + Math.random()*38,
    phase: Math.random()*10,
    orbitF: 0.52 + Math.random()*0.18,
    cx:0, cy:0, r:50, orbit:0
  });
}

function resize(){
  dpr = Math.min(window.devicePixelRatio||1, 1.75);
  W = window.innerWidth;
  H = window.innerHeight;
  CX = W/2; CY = H/2;
  canvas.width = Math.floor(W*dpr);
  canvas.height = Math.floor(H*dpr);
  canvas.style.width = W+'px';
  canvas.style.height = H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  if(core.x===0){ core.x = core.tx = CX; core.y = core.ty = CY; }
}
window.addEventListener('resize', resize);
resize();

// UI
const rv = document.getElementById('rv');
const lv = document.getElementById('lv');
document.getElementById('rays').addEventListener('input', e=>{
  rayCount = +e.target.value; rv.textContent = rayCount;
});
document.getElementById('layers').addEventListener('input', e=>{
  layerCount = +e.target.value; lv.textContent = layerCount;
});

// pointer
function setTarget(x,y){ core.tx = x; core.ty = y; }
window.addEventListener('pointerdown', e=>{ setTarget(e.clientX, e.clientY); canvas.setPointerCapture?.(e.pointerId); });
window.addEventListener('pointermove', e=>{ if(e.buttons || e.pointerType!=='mouse') setTarget(e.clientX, e.clientY); });
window.addEventListener('pointerenter', e=> setTarget(e.clientX, e.clientY));

// ── OhAI~ live field bridge ────────────────────────────────────────────────
// Add ?ohai=http://localhost:7700 to the URL to connect to a running server.
// The drawing spine drives the Rayveil field in real time:
//   draw_color_spine   → primary hue of the shells
//   draw_geo_spine     → cutter count, orbit radius, rotation speed
//   convergence_depth  → base radius (deeper spine = larger field)
//   phase_shadow       → breathing rate, pulsation
//   carry word         → core drift bias
//
// Operations → cutter character:
//   subtract / cut / nand  → fast orbit, large cutter (strong carving)
//   breathe / swell        → slow drift, medium cutter (soft carve)
//   crystallize / freeze   → very slow, wide cutter (plate-like)
//   scatter / disperse     → fast random, small cutter
//   boundary / wrap        → stationary, ring-like

const OHAI_URL = new URLSearchParams(location.search).get('ohai') || null;
let ohaiState = null;   // last fetched draw state
let ohaiHue   = 192;    // primary hue — default cyan, overridden by color spine

const OP_CUTTER_PROFILE = {
  subtract:   { speedMul: 2.2,  radiusMul: 1.3,  orbitMul: 0.55 },
  cut:        { speedMul: 2.0,  radiusMul: 1.1,  orbitMul: 0.50 },
  sever:      { speedMul: 2.5,  radiusMul: 0.9,  orbitMul: 0.48 },
  nand:       { speedMul: 1.8,  radiusMul: 1.4,  orbitMul: 0.60 },
  void_expand:{ speedMul: 1.6,  radiusMul: 1.5,  orbitMul: 0.65 },
  breathe:    { speedMul: 0.4,  radiusMul: 1.0,  orbitMul: 0.52 },
  swell:      { speedMul: 0.3,  radiusMul: 1.2,  orbitMul: 0.58 },
  crystallize:{ speedMul: 0.15, radiusMul: 1.6,  orbitMul: 0.72 },
  freeze:     { speedMul: 0.12, radiusMul: 1.7,  orbitMul: 0.70 },
  scatter:    { speedMul: 3.0,  radiusMul: 0.7,  orbitMul: 0.38 },
  disperse:   { speedMul: 2.8,  radiusMul: 0.6,  orbitMul: 0.35 },
  boundary:   { speedMul: 0.05, radiusMul: 1.8,  orbitMul: 0.80 },
  wrap:       { speedMul: 0.08, radiusMul: 1.6,  orbitMul: 0.75 },
  default:    { speedMul: 1.0,  radiusMul: 1.0,  orbitMul: 0.52 },
};

function hexToHue(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  if(max===min) return 0;
  const d = max - min;
  let h = max===r ? (g-b)/d + (g<b?6:0)
        : max===g ? (b-r)/d + 2
                  : (r-g)/d + 4;
  return h * 60;
}

function applyOhAIState(ds) {
  ohaiState = ds;
  const ops    = (ds.operations || []).slice(0, 7);
  const pal    = ds.palette || [];
  const depth  = ds.draw_exchange || 0;

  // Hue from dominant color in the spine
  if(pal.length > 0 && pal[0].hex && pal[0].hex.startsWith('#')) {
    ohaiHue = hexToHue(pal[0].hex);
  }

  // Rebuild cutters from geo-spine operations
  const targetN = Math.max(2, Math.min(ops.length + 1, 7));
  while(cutters.length < targetN) {
    const i = cutters.length;
    cutters.push({
      a: i*TAU/targetN + Math.random(),
      speed: (0.006 + Math.random()*0.004) * (i%2?1:-1),
      baseR: 48 + Math.random()*38, phase: Math.random()*10,
      orbitF: 0.52 + Math.random()*0.18, cx:0, cy:0, r:50, orbit:0
    });
  }
  while(cutters.length > targetN) cutters.pop();

  ops.forEach((op, i) => {
    const key = (op.op || 'default').replace(/-/g,'_');
    const prof = OP_CUTTER_PROFILE[key] || OP_CUTTER_PROFILE.default;
    const c = cutters[i];
    const sign = (i%2 ? 1 : -1);
    // Blend toward new values rather than snapping — smooth transitions
    const cnt  = Math.max(op.count || 1, 1);
    c.speed  += ((0.006 * prof.speedMul * sign) - c.speed) * 0.05;
    c.baseR  += ((30 + cnt * 7) * prof.radiusMul - c.baseR) * 0.04;
    c.orbitF += (prof.orbitMul - c.orbitF) * 0.04;
  });
}

async function fetchOhAI() {
  if(!OHAI_URL) return;
  try {
    const res = await fetch(OHAI_URL + '/draw/render', {signal: AbortSignal.timeout(4000)});
    if(!res.ok) return;
    applyOhAIState(await res.json());
  } catch(e) { /* server unreachable — keep previous state */ }
}

if(OHAI_URL) {
  document.getElementById('ohai-status').style.display = 'block';
  const ohaiLabel = document.getElementById('ohai-label');
  const _origApply = applyOhAIState;
  window._applyOhAIState = function(ds) {
    _origApply(ds);
    const ops  = (ds.operations||[]).length;
    const cols = (ds.palette||[]).length;
    const ex   = ds.draw_exchange || 0;
    ohaiLabel.textContent = `ops:${ops} colors:${cols} ex:${ex}`;
  };
  const _origFetch = fetchOhAI;
  fetchOhAI = async function() {
    if(!OHAI_URL) return;
    try {
      const res = await fetch(OHAI_URL+'/draw/render', {signal:AbortSignal.timeout(4000)});
      if(!res.ok){ ohaiLabel.textContent='server error'; return; }
      window._applyOhAIState(await res.json());
    } catch(e) { ohaiLabel.textContent='unreachable'; }
  };
  fetchOhAI();
  setInterval(fetchOhAI, 3000);
}

// ── 2D SDFs ────────────────────────────────────────────────────────────────
function sdCircle(px,py,cx,cy,r){ return Math.hypot(px-cx, py-cy) - r; }
function sdfWorld(px,py, baseR){
  // large central circle MINUS cutters
  let d = sdCircle(px,py, core.x, core.y, baseR);
  for(let i=0;i<cutters.length;i++){
    const c = cutters[i];
    const d2 = sdCircle(px,py, c.cx, c.cy, c.r);
    d = Math.max(d, -d2); // subtract
  }
  return d;
}

let lastFpsT = performance.now(), frames=0, fps=60;

function frame(now){
  // ease core
  core.x += (core.tx - core.x) * 0.12;
  core.y += (core.ty - core.y) * 0.12;

  // breathing base radius — grows with OhAI~ convergence depth
  const depthScale = ohaiState ? Math.min(0.30, 0.18 + (ohaiState.draw_exchange||0) * 0.0004) : 0.265;
  const baseR = Math.min(W,H) * depthScale + Math.sin(now*0.0012)*10;

  // update cutters – slow organic orbit
  for(const c of cutters){
    c.a += c.speed * 0.6;
    const wob = Math.sin(now*0.00023 + c.phase)*0.25;
    c.orbit = baseR * c.orbitF * (1 + wob*0.12);
    c.cx = core.x + Math.cos(c.a + Math.sin(now*0.00019 + c.phase)*0.4) * c.orbit;
    c.cy = core.y + Math.sin(c.a + Math.cos(now*0.00021 + c.phase)*0.4) * c.orbit;
    c.r = c.baseR + Math.sin(now*0.0011 + c.phase)*9;
  }

  // golden angle to avoid repetition
  rayOffset = (rayOffset + GOLDEN * 0.22) % TAU;

  // --- Raymarch ---
  const distances = new Float32Array(rayCount);
  const angles = new Float32Array(rayCount);
  const maxSteps = 40;
  const maxDist = Math.max(W,H)*0.75;

  for(let i=0;i<rayCount;i++){
    const ang = (i / rayCount) * TAU + rayOffset;
    angles[i] = ang;
    const dx = Math.cos(ang), dy = Math.sin(ang);
    let t = 0;
    let vel = 0.015;
    for(let s=0;s<maxSteps;s++){
      const px = core.x + dx*t;
      const py = core.y + dy*t;
      const d = sdfWorld(px,py, baseR);
      if(Math.abs(d) < 0.001) break;
      vel = vel + 0.15 * d;
      if(vel < 0.015) vel = 0.015; else if(vel > 0.12) vel = 0.12;
      t += (d > 0.015 ? d : 0.015) + vel;
      if(t > maxDist){ t = maxDist; break; }
    }
    distances[i] = t;
  }

  // 3-tap blur, twice for softness
  const tmp = new Float32Array(rayCount);
  for(let i=0;i<rayCount;i++){
    const p = distances[(i-1+rayCount)%rayCount];
    const c = distances[i];
    const n = distances[(i+1)%rayCount];
    tmp[i] = (p + c*1.3 + n) / 3.3;
  }
  for(let i=0;i<rayCount;i++){
    const p = tmp[(i-1+rayCount)%rayCount];
    const c = tmp[i];
    const n = tmp[(i+1)%rayCount];
    distances[i] = (p + c + n) / 3;
  }

  // --- Draw ---
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = '#050810';
  ctx.fillRect(0,0,W,H);

  // soft vignette
  const vg = ctx.createRadialGradient(CX,CY, Math.min(W,H)*0.15, CX,CY, Math.max(W,H)*0.7);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,6,18,0.65)');
  ctx.fillStyle = vg;
  ctx.fillRect(0,0,W,H);

  const scales = [1.0, 0.87, 0.74, 0.61, 0.48];
  const alphas = [0.6, 0.45, 0.3, 0.2, 0.12];

  ctx.globalCompositeOperation = 'lighter';

  for(let l=0; l<layerCount; l++){
    const scale = scales[l] * (1 + Math.sin(now*0.0007 + l*1.3)*0.018);
    const alpha = alphas[l];

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowBlur = 36 + l*6;
    ctx.shadowColor = 'rgba(90,220,255,0.85)';

    // radial gradient fill
    const maxR = baseR * 1.5 * scale;
    const grad = ctx.createRadialGradient(core.x, core.y, baseR*0.05, core.x, core.y, maxR);
    const hue = ohaiHue + Math.sin(now*0.00025 + l)*10;
    grad.addColorStop(0, `hsla(${hue},100%,78%,1)`);
    grad.addColorStop(0.25, `hsla(${hue+8},100%,66%,0.65)`);
    grad.addColorStop(0.55, `hsla(${hue+16},90%,58%,0.22)`);
    grad.addColorStop(1, `hsla(${hue+24},70%,45%,0)`);
    ctx.fillStyle = grad;

    // build smooth polygon
    const xs = new Float32Array(rayCount);
    const ys = new Float32Array(rayCount);
    for(let i=0;i<rayCount;i++){
      const r = distances[i] * scale * (1 + Math.sin(now*0.001 + i*0.41)*0.012);
      xs[i] = core.x + Math.cos(angles[i]) * r;
      ys[i] = core.y + Math.sin(angles[i]) * r;
    }

    ctx.beginPath();
    ctx.moveTo(xs[0], ys[0]);
    for(let i=0;i<rayCount;i++){
      const i0 = (i-1+rayCount)%rayCount;
      const i1 = i;
      const i2 = (i+1)%rayCount;
      const i3 = (i+2)%rayCount;
      const x1 = xs[i1], y1 = ys[i1];
      const x2 = xs[i2], y2 = ys[i2];
      const cp1x = x1 + (x2 - xs[i0]) * 0.16;
      const cp1y = y1 + (y2 - ys[i0]) * 0.16;
      const cp2x = x2 - (xs[i3] - x1) * 0.16;
      const cp2y = y2 - (ys[i3] - y1) * 0.16;
      ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,x2,y2);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // core – healing pulse
  ctx.globalCompositeOperation = 'screen';
  const pulse = 5.5 + Math.sin(now*0.0031)*1.3 + Math.sin(now*0.0017)*0.7;
  const coreGlow = ctx.createRadialGradient(core.x,core.y,0, core.x,core.y, pulse*7);
  coreGlow.addColorStop(0,'rgba(190,245,255,0.95)');
  coreGlow.addColorStop(0.35,'rgba(90,200,255,0.38)');
  coreGlow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = coreGlow;
  ctx.beginPath();
  ctx.arc(core.x,core.y,pulse*7,0,TAU);
  ctx.fill();

  ctx.shadowBlur = 18;
  ctx.shadowColor = 'rgba(120,230,255,0.9)';
  ctx.fillStyle = 'rgba(210,250,255,0.98)';
  ctx.beginPath();
  ctx.arc(core.x,core.y,pulse,0,TAU);
  ctx.fill();
  ctx.shadowBlur = 0;

  // fps
  frames++;
  if(now - lastFpsT > 600){
    fps = Math.round(frames*1000/(now-lastFpsT));
    document.getElementById('fps').textContent = fps;
    frames = 0; lastFpsT = now;
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// prevent scroll
document.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});
</script>
</body>
