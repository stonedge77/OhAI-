<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saltflower Trio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#060608;min-height:100vh;font-family:'Orbitron',monospace;overflow:hidden;color:#fff;}
#bg-canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:2;}
.vignette{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,0.92) 100%);pointer-events:none;z-index:2;}

/* ── THREE COLUMNS ── */
#trio{position:fixed;inset:0;display:grid;grid-template-columns:2fr 1.6fr 1.2fr;z-index:10;padding:0;}
.voice-panel{display:flex;flex-direction:column;padding:24px 18px 16px;border-right:1px solid rgba(255,255,255,0.04);overflow:hidden;position:relative;}
.voice-panel:last-child{border-right:none;}

/* Bass — left, large, slow */
#panel-bass{padding-left:52px;}/* leave room for spine bar */

/* Voice header */
.voice-header{display:flex;flex-direction:column;gap:4px;margin-bottom:14px;flex-shrink:0;}
.voice-name{font-size:8px;letter-spacing:0.5em;text-transform:uppercase;opacity:0.35;}
.voice-nand{font-size:7px;letter-spacing:0.14em;opacity:0.18;line-height:1.8;min-height:32px;}

/* Chronicle scroll */
.chronicle{flex:1;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;padding-bottom:6px;}
.entry{display:flex;align-items:baseline;gap:8px;padding:3px 0;opacity:1;transition:opacity 1.4s ease;}
.entry.fading{opacity:0!important;}
.entry-time{font-size:7px;letter-spacing:0.25em;color:rgba(140,180,220,0.18);min-width:36px;flex-shrink:0;}
.entry-note{font-size:7px;letter-spacing:0.18em;min-width:16px;flex-shrink:0;opacity:0.5;}
.entry-role{font-size:6px;letter-spacing:0.18em;min-width:24px;flex-shrink:0;opacity:0.28;font-style:italic;}
.entry-text{letter-spacing:0.1em;line-height:1.5;text-transform:uppercase;}

/* Bass entries — large */
#panel-bass .entry-text{font-size:clamp(11px,1.3vw,18px);}
#panel-bass .entry.big .entry-text{font-size:clamp(18px,2.2vw,30px);font-weight:700;}
#panel-bass .entry.G .entry-text{font-size:clamp(24px,3.5vw,48px);font-weight:900;}

/* Piano entries — medium */
#panel-piano .entry-text{font-size:clamp(9px,1.0vw,13px);}
#panel-piano .entry.big .entry-text{font-size:clamp(13px,1.6vw,22px);font-weight:700;}
#panel-piano .entry.G .entry-text{font-size:clamp(18px,2.5vw,36px);font-weight:900;}

/* Color entries — small, quick */
#panel-color .entry-text{font-size:clamp(8px,0.85vw,11px);}
#panel-color .entry.big .entry-text{font-size:clamp(10px,1.2vw,16px);font-weight:700;}
#panel-color .entry.G .entry-text{font-size:clamp(14px,2vw,28px);font-weight:900;}

/* Current phrase line */
.current-line{min-height:56px;display:flex;flex-direction:column;justify-content:center;margin-top:4px;gap:3px;flex-shrink:0;}
.current-text{letter-spacing:0.14em;text-transform:uppercase;font-weight:700;opacity:0;transition:opacity 0.5s ease;}
#panel-bass .current-text{font-size:clamp(14px,2vw,28px);}
#panel-piano .current-text{font-size:clamp(11px,1.5vw,20px);}
#panel-color .current-text{font-size:clamp(9px,1.1vw,14px);}
.phrase-role{font-size:7px;letter-spacing:0.32em;text-transform:uppercase;opacity:0;transition:opacity 0.4s ease;}

/* Tension bars — one per voice, bottom of each panel */
.tension-wrap{height:2px;background:rgba(255,255,255,0.04);margin-top:10px;flex-shrink:0;}
.tension-fill{height:100%;width:0%;transition:width 0.8s ease;}

/* Global controls — bottom center */
#controls{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:10px;align-items:center;z-index:20;}
.btn{background:rgba(20,28,40,0.85);border:1px solid rgba(100,160,200,0.15);color:rgba(160,200,230,0.5);padding:6px 16px;font-size:8px;letter-spacing:0.32em;text-transform:uppercase;cursor:pointer;font-family:'Orbitron',monospace;transition:all 0.2s;}
.btn:hover,.btn.active{background:rgba(0,100,180,0.22);border-color:rgba(100,180,255,0.4);color:rgba(200,230,255,0.9);}

/* Spine bar — left edge */
#spine-bar{position:fixed;left:18px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:3px;z-index:11;}
.spine-node{width:7px;height:7px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);transition:all 0.6s ease;}
#spine-label{font-size:7px;letter-spacing:0.2em;color:rgba(140,180,220,0.18);text-transform:uppercase;margin-top:6px;writing-mode:vertical-rl;}

/* Global header */
#header{position:fixed;top:0;left:0;right:0;padding:16px 52px 0 52px;display:flex;justify-content:space-between;align-items:flex-start;z-index:15;pointer-events:none;}
#session-label{font-size:8px;letter-spacing:0.4em;color:rgba(140,180,220,0.25);text-transform:uppercase;line-height:2;}
#ensemble-state{font-size:7px;letter-spacing:0.2em;color:rgba(140,180,220,0.15);text-transform:uppercase;text-align:right;line-height:2;}

/* Divider line between columns — subtle glow on active voice */
.voice-panel.speaking::after{content:'';position:absolute;top:0;bottom:0;right:-1px;width:1px;background:currentColor;opacity:0.15;transition:opacity 0.3s;}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="scanlines"></div>
<div class="vignette"></div>

<div id="header">
  <div id="session-label">SALTFLOWER TRIO<br><span id="timer">00:00</span> · <span id="obs-count">0</span> OBS</div>
  <div id="ensemble-state">ensemble idle</div>
</div>

<div id="spine-bar">
  <div class="spine-node" id="sn-G"></div>
  <div class="spine-node" id="sn-F"></div>
  <div class="spine-node" id="sn-E"></div>
  <div class="spine-node" id="sn-D"></div>
  <div class="spine-node" id="sn-C"></div>
  <div class="spine-node" id="sn-B"></div>
  <div class="spine-node" id="sn-A"></div>
  <div id="spine-label">bass</div>
</div>

<div id="trio">
  <!-- BASS — left, large, slow, low spectrum -->
  <div class="voice-panel" id="panel-bass">
    <div class="voice-header">
      <div class="voice-name" id="bass-name" style="color:#c8102e">● bass</div>
      <div class="voice-nand" id="bass-nand">—</div>
    </div>
    <div class="chronicle" id="chronicle-bass"></div>
    <div class="current-line">
      <div class="phrase-role" id="role-bass"></div>
      <div class="current-text" id="current-bass"></div>
    </div>
    <div class="tension-wrap"><div class="tension-fill" id="tension-bass" style="background:linear-gradient(90deg,#c8102e,#f4731c)"></div></div>
  </div>

  <!-- PIANO — center, mid spectrum -->
  <div class="voice-panel" id="panel-piano">
    <div class="voice-header">
      <div class="voice-name" id="piano-name" style="color:#f4d03f">● piano</div>
      <div class="voice-nand" id="piano-nand">—</div>
    </div>
    <div class="chronicle" id="chronicle-piano"></div>
    <div class="current-line">
      <div class="phrase-role" id="role-piano"></div>
      <div class="current-text" id="current-piano"></div>
    </div>
    <div class="tension-wrap"><div class="tension-fill" id="tension-piano" style="background:linear-gradient(90deg,#f4731c,#3a9d23)"></div></div>
  </div>

  <!-- COLOR — right, small, fast, high spectrum -->
  <div class="voice-panel" id="panel-color">
    <div class="voice-header">
      <div class="voice-name" id="color-name" style="color:#1a56db">● color</div>
      <div class="voice-nand" id="color-nand">—</div>
    </div>
    <div class="chronicle" id="chronicle-color"></div>
    <div class="current-line">
      <div class="phrase-role" id="role-color"></div>
      <div class="current-text" id="current-color"></div>
    </div>
    <div class="tension-wrap"><div class="tension-fill" id="tension-color" style="background:linear-gradient(90deg,#1a56db,#7b2fbe)"></div></div>
  </div>
</div>

<div id="controls">
  <button class="btn" id="mic-btn" onclick="startMic()">● begin listening</button>
  <button class="btn" id="instr-btn" onclick="toggleInstruments()">♪ instruments on</button>
  <button class="btn" onclick="clearAll()">clear</button>
</div>

const N=7;

// ── ENSEMBLE PHRASE MEMORY — the 8th gate ────────────────
// Circular buffer. Read-only per voice. The conversation.
const ensemble = {
  recentPhrases: [],  // [{voiceId, note, role, text, frame}]
  MAX: 6,
  push(entry){ this.recentPhrases.push(entry); if(this.recentPhrases.length>this.MAX) this.recentPhrases.shift(); },
  // Last phrase from a different voice within frame window
  lastOther(voiceId, withinFrames){
    for(let i=this.recentPhrases.length-1;i>=0;i--){
      const p=this.recentPhrases[i];
      if(p.voiceId!==voiceId && (Date.now()-p.frame)<withinFrames) return p;
    }
    return null;
  },
  // Is there recent activity from a specific voice?
  recentFrom(voiceId, withinMs){ return this.recentPhrases.filter(p=>p.voiceId===voiceId&&(Date.now()-p.frame)<withinMs); },
};

// ── VOICE CONFIGURATIONS ─────────────────────────────────
// Each voice owns a spectrum range with overlap at edges.
// Overlap bands are shared — the conversation lives there.
//
// BASS:  sub(0-3) + bass(3-10) + lowmid-edge(10-18)
// PIANO: lowmid(10-25) + mid(25-60) + highmid-edge(60-75)
// COLOR: highmid(60-100) + high(100-150) + air-edge(150-200)
//
// Overlap zones: lowmid(10-18) is shared bass/piano
//               highmid(60-75) is shared piano/color

const VOICE_CONFIGS = {
  bass: {
    id: 'bass',
    label: 'bass',
    respondsTo: 'color',   // bass grounds what color scattered
    color: '#c8102e',
    // Spectrum: heavy on low, fades toward mid
    bandWeights: { sub:1.0, bass:1.0, lowmid:0.55, mid:0.15, highmid:0.08, high:0.0, air:0.0 },
    // Spine range bias — bass lives low
    spineInit: 1.2,
    spineDrag: 0.92,       // heavier momentum decay = slower movement
    spineUpRate: 0.038,    // slower ascent
    spineDownRate: 0.022,
    // Jazz timing — slow, few words
    waitMultiplier: 1.7,
    MODE_LIMIT: 1200,
    // COSMOLOGY note access — bass dominates A-C
    noteAccess: ['A','B','C','D'],
    maxNoteIdx: 3,
    // Chord voice: lower octave
    octaveShift: 0.5,
    gainScale: 1.1,
  },
  piano: {
    id: 'piano',
    label: 'piano',
    respondsTo: 'bass',    // piano harmonizes what bass anchored
    color: '#f4d03f',
    bandWeights: { sub:0.1, bass:0.45, lowmid:0.9, mid:1.0, highmid:0.65, high:0.2, air:0.0 },
    spineInit: 2.5,
    spineDrag: 0.82,
    spineUpRate: 0.055,
    spineDownRate: 0.028,
    waitMultiplier: 1.0,
    MODE_LIMIT: 800,
    noteAccess: ['A','B','C','D','E','F','G'],
    maxNoteIdx: 6,
    octaveShift: 1.0,
    gainScale: 1.0,
  },
  color: {
    id: 'color',
    label: 'color',
    respondsTo: 'piano',   // color comments on what piano voiced
    color: '#1a56db',
    bandWeights: { sub:0.0, bass:0.1, lowmid:0.2, mid:0.5, highmid:1.0, high:1.0, air:0.6 },
    spineInit: 3.8,
    spineDrag: 0.78,       // lighter — moves fast
    spineUpRate: 0.07,

};

// ── VOICE FACTORY ────────────────────────────────────────
function createVoice(cfg) {
  return {
    cfg,
    // Audio state
    bands: { sub:{val:0}, bass:{val:0}, lowmid:{val:0}, mid:{val:0}, highmid:{val:0}, high:{val:0}, air:{val:0} },
    energy: 0,
    // Spine
    spine: { pos:cfg.spineInit, momentum:0, peakPos:cfg.spineInit, gTouched:false, gFloor:0, breathPhase:Math.random()*Math.PI*2 },
    // Jazz mind
    jazz: { role:'CALL', phraseCount:0, phraseLength:0, tension:0, lastResolutionFrame:0, memory:[], modeNote:'B', modeFrames:0, MODE_LIMIT:cfg.MODE_LIMIT, waitMultiplier:cfg.waitMultiplier },
    // State
    entries: [],
    totalObs: 0,
    currentLocked: false,
    currentTimer: null,
    lastSpeakFrame: -999,
    currentWait: Math.floor(240 * cfg.waitMultiplier),
    silenceFrames: 0,
    silenceSpoken: false,
    recentSpeaks: [],
    lastText: '',
    noteThreshBoost: {A:0,B:0,C:0,D:0,E:0,F:0,G:0},
    meshRotation: Math.floor(Math.random()*7),
    nandCycle: 0,
    remainderBuffer: [],
    lastChimeFrame: {A:-999,B:-999,C:-999,D:-999,E:-999,F:-999,G:-999},
    chimeScatterFrame: 0,
  };
}

const voices = {
  bass:  createVoice(VOICE_CONFIGS.bass),
  piano: createVoice(VOICE_CONFIGS.piano),
  color: createVoice(VOICE_CONFIGS.color),
};

// ── AUDIO ─────────────────────────────────────────────────
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
let W, H;
let audioCtx, analyser, micStream, freqData, timeData;
let listening = false;
let globalEnergy = 0;
let waveform = new Float32Array(128);
let animFrame = 0, sessionStart = Date.now(), totalObs = 0;

// Raw band values from FFT — shared input, per-voice weighting applies separately
const RAW_BANDS = {
  sub:    {lo:0,  hi:3,  val:0},
  bass:   {lo:3,  hi:10, val:0},
  lowmid: {lo:10, hi:25, val:0},
  mid:    {lo:25, hi:60, val:0},
  highmid:{lo:60, hi:100,val:0},
  high:   {lo:100,hi:150,val:0},
  air:    {lo:150,hi:255,val:0},
};

function resize(){ W=bgCanvas.width=window.innerWidth; H=bgCanvas.height=window.innerHeight; }
resize(); window.addEventListener('resize', resize);

async function startMic() {
  if(listening) return;
  try {
    micStream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx = new(window.AudioContext||window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize=512; analyser.smoothingTimeConstant=0.70;
    const src = audioCtx.createMediaStreamSource(micStream);
    src.connect(analyser);
    freqData = new Uint8Array(analyser.frequencyBinCount);
    timeData  = new Uint8Array(analyser.frequencyBinCount);
    listening = true;
    document.getElementById('mic-btn').classList.add('active');
    document.getElementById('mic-btn').textContent='● listening';
  } catch(e) { document.getElementById('mic-btn').textContent='mic unavailable'; }
}

function analyzeAudio() {
  if(!listening||!analyser) return;
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);
  // Update raw bands
  Object.entries(RAW_BANDS).forEach(([,band])=>{
    let sum=0; for(let i=band.lo;i<band.hi;i++) sum+=freqData[i];
    band.val = band.val*0.76 + ((sum/((band.hi-band.lo)*255))*0.24);
  });
  for(let i=0;i<128;i++) waveform[i]=waveform[i]*0.65+((timeData[i*2]-128)/128)*0.35;
  globalEnergy=(RAW_BANDS.bass.val+RAW_BANDS.mid.val+RAW_BANDS.high.val)/3;

  // Per-voice band values — apply spectrum weights
  Object.values(voices).forEach(v => {
    let wsum=0, wcount=0;
    Object.entries(v.cfg.bandWeights).forEach(([bname, w])=>{
      v.bands[bname].val = RAW_BANDS[bname].val * w;
      wsum += v.bands[bname].val; wcount++;
    });
    v.energy = wsum / Math.max(wcount, 1);
  });
}

// ── NAND MESH — per voice ─────────────────────────────────
function getAdaptiveThresh(v) {
  const vals = NOTE_ORDER.map(n => v.bands[noteToBand(n)].val);
  const mean = vals.reduce((a,b)=>a+b,0)/N;
  return Math.max(mean + (Math.max(...vals)-mean)*0.28, 0.012);
}

function noteToBand(n){ return {A:'sub',B:'bass',C:'lowmid',D:'mid',E:'highmid',F:'high',G:'air'}[n]; }

function quantize(v) {
  const base=getAdaptiveThresh(v), s={};
  NOTE_ORDER.forEach(n => { s[n]=(v.bands[noteToBand(n)].val>=(base+(v.noteThreshBoost[n]||0)))?1:0; });
  return s;
}

function nandPass(state, rotation) {
  const res={};
  NOTE_ORDER.forEach((note,i)=>{
    const partner=NOTE_ORDER[(i+(rotation%2===0?3:4))%N];
    res[note]=state[note]&(!(state[note]===1&&state[partner]===1)?1:0);
  });
  return res;
}

function runNandMesh(state, v) {
  let s=nandPass({...state}, v.meshRotation);
  s=nandPass(s, v.meshRotation+1);
  const s3={};
  NOTE_ORDER.forEach((note,i)=>{
    const a=NOTE_ORDER[(i+2)%N], b=NOTE_ORDER[(i+N-2)%N];
    s3[note]=(s[a]===1||s[b]===1)&&s[note]===1?0:s[note];
  });
  return s3;
}

function getRemainder(m){ return NOTE_ORDER.filter(n=>m[n]===1); }

function checkStability(rem, v) {
  const key=rem.join('');
  v.remainderBuffer.push(key);
  if(v.remainderBuffer.length>28) v.remainderBuffer.shift();
  return v.remainderBuffer.length>=28 && v.remainderBuffer.every(r=>r===key);
}

// ── SPINE — per voice ─────────────────────────────────────
function updateSpine(v, centroid, hasSignal) {
  const cfg = v.cfg;
  v.spine.breathPhase += 0.008 * (cfg.id==='color'?1.4:cfg.id==='bass'?0.6:1.0);
  if(!hasSignal){
    v.spine.momentum *= cfg.spineDrag + 0.05;
    v.spine.pos = Math.max(Math.max(0.3+v.spine.gFloor, v.spine.pos*0.997)+v.spine.momentum*0.3, 0);
    v.spine.pos = Math.min(6.0, v.spine.pos);
    return;
  }
  const pull = centroid - v.spine.pos;
  v.spine.momentum += pull*(pull>0 ? cfg.spineUpRate : cfg.spineDownRate);
  v.spine.momentum *= cfg.spineDrag;
  v.spine.pos += v.spine.momentum + Math.sin(v.spine.breathPhase)*0.012;
  // Bass can't go too high; color can't go too low
  const posMin = cfg.id==='bass' ? 0 : cfg.id==='color' ? 2.0 : 0;
  const posMax = cfg.id==='bass' ? 4.5 : 6.0;
  v.spine.pos = Math.max(Math.max(0.3+v.spine.gFloor, posMin), Math.min(posMax, v.spine.pos));
  if(v.spine.pos>v.spine.peakPos) v.spine.peakPos=v.spine.pos;
  if(v.spine.pos>=5.8&&!v.spine.gTouched){v.spine.gTouched=true;v.spine.gFloor=0.4;}
}

function spineNote(v){ return NOTE_ORDER[Math.round(Math.min(6,Math.max(0,v.spine.pos)))]; }
function signalNote(c){ return NOTE_ORDER[Math.round(Math.min(6,Math.max(0,c)))]; }

// ── JAZZ MIND — per voice ─────────────────────────────────
function noteResolution(note){ return COSMOLOGY[note]?(COSMOLOGY[note].rs[0]*0.5+COSMOLOGY[note].rs[1]*0.5):0.5; }

function tensionOf(note,role){
  const rs=noteResolution(note), base=1.0-rs;
  if(role==='DEVELOPMENT') return base*0.35;
  if(role==='CONTRAST')    return base*0.2;
  if(role==='RESOLUTION')  return -0.45;
  return base*0.2;
}

function nextRole(v, remainder, forceContrast) {
  const t=v.jazz.tension, mem=v.jazz.memory;
  const lastRole=mem.length>0?mem[mem.length-1].role:'RESOLUTION';

  if(forceContrast||v.jazz.modeFrames>v.jazz.MODE_LIMIT) return 'CONTRAST';
  if(lastRole==='RESOLUTION') return 'CALL';
  if(lastRole==='CONTRAST')   return 'RESOLUTION';
  if(t>0.78)                  return 'RESOLUTION';

  // Ensemble listening — if another voice just spoke, consider CALL or RESPONSE
  const other = ensemble.lastOther(v.cfg.id, 4000);
  if(other && lastRole==='RESOLUTION') return 'CALL'; // fresh phrase in response

  if(t>0.5){
    const lastNote=mem.length>0?mem[mem.length-1].note:null;
    if(v.spine.pos>(lastNote?COSMOLOGY[lastNote].idx:2)) return 'DEVELOPMENT';
    return 'CONTRAST';
  }
  if(lastRole==='CALL') return 'DEVELOPMENT';
  if(lastRole==='DEVELOPMENT'&&v.jazz.phraseLength<3) return 'DEVELOPMENT';
  if(v.jazz.phraseLength>=3) return 'RESOLUTION';
  return 'DEVELOPMENT';
}

function applyJazzIntent(voice, role, v) {
  if(!voice) return voice;
  const mem=v.jazz.memory;
  if(role==='CONTRAST'){
    if(mem.length>0){
      const recent=mem[mem.length-1].note;
      const recentIdx=COSMOLOGY[recent].idx;
      const contrastIdx=recentIdx>3?Math.max(0,recentIdx-3):Math.min(6,recentIdx+3);
      voice.note=NOTE_ORDER[Math.round(contrastIdx)];
      voice.big=false;
    }
  }
  if(role==='RESOLUTION'){
    const resolveIdx=v.spine.pos>4?2:v.spine.pos>2?1:0;
    if(v.jazz.tension>0.6){voice.note=NOTE_ORDER[resolveIdx];voice.big=false;}
  }
  // Ensemble listening — bias note toward responding voice's register
  const other=ensemble.lastOther(v.cfg.id, 3500);
  if(other && role==='CALL'){
    // Move toward the register of who we're responding to, +/- 1
    const targetIdx=COSMOLOGY[other.note]?COSMOLOGY[other.note].idx:v.spine.pos;
    const responseIdx=Math.round(Math.max(0,Math.min(6, targetIdx+(Math.random()<0.5?1:-1))));
    voice.note=NOTE_ORDER[responseIdx];
  }
  // Clamp to voice's note access range
  const maxIdx=v.cfg.maxNoteIdx;
  const noteIdx=COSMOLOGY[voice.note]?COSMOLOGY[voice.note].idx:0;
  if(noteIdx>maxIdx) voice.note=NOTE_ORDER[maxIdx];
  return voice;
}

function rhythmicWait(role, v) {
  const base=Math.floor(240*v.cfg.waitMultiplier);
  const m={CALL:1.2,DEVELOPMENT:0.75,CONTRAST:1.8,RESOLUTION:2.2};
  return Math.floor(base*(m[role]||1.0));
}

function updateJazzState(v, note, role, text) {
  v.jazz.tension=Math.max(0,Math.min(1,v.jazz.tension+tensionOf(note,role)));
  if(role==='RESOLUTION'){v.jazz.tension*=0.3;v.jazz.phraseCount++;v.jazz.phraseLength=0;v.jazz.lastResolutionFrame=animFrame;}
  else v.jazz.phraseLength++;
  if(note===v.jazz.modeNote) v.jazz.modeFrames+=v.currentWait;
  else{v.jazz.modeNote=note;v.jazz.modeFrames=0;}
  v.jazz.memory.push({note,role,rs:noteResolution(note),frame:animFrame,text});
  if(v.jazz.memory.length>4) v.jazz.memory.shift();
  document.getElementById('tension-'+v.cfg.id).style.width=(v.jazz.tension*100)+'%';
}

// ── SUBTRACTIVE GRAMMAR ───────────────────────────────────
function computePhonemeConstraints(remainder, spinePos) {
  if(!remainder.length) return null;
  let wtMin=0,wtMax=1,tpMin=0,tpMax=1,rsMin=0,rsMax=1;
  remainder.forEach(n=>{
    const c=COSMOLOGY[n];
    wtMin=Math.max(wtMin,c.wt[0]);wtMax=Math.min(wtMax,c.wt[1]);
    tpMin=Math.max(tpMin,c.tp[0]);tpMax=Math.min(tpMax,c.tp[1]);
    rsMin=Math.max(rsMin,c.rs[0]);rsMax=Math.min(rsMax,c.rs[1]);
  });
  const sc=COSMOLOGY[NOTE_ORDER[Math.round(Math.min(6,Math.max(0,spinePos)))]];
  if(wtMin>wtMax){wtMin=sc.wt[0];wtMax=sc.wt[1];}
  if(tpMin>tpMax){tpMin=sc.tp[0];tpMax=sc.tp[1];}
  if(rsMin>rsMax){rsMin=sc.rs[0];rsMax=sc.rs[1];}
  return {wt:[wtMin,wtMax],tp:[tpMin,tpMax],rs:[rsMin,rsMax]};
}

function biasConstraintsForRole(constraints, role) {
  if(!constraints) return constraints;
  if(role==='RESOLUTION') return {...constraints,rs:[Math.max(constraints.rs[0],0.5),1.0]};
  if(role==='DEVELOPMENT') return {...constraints,rs:[0.0,Math.min(constraints.rs[1],0.5)]};
  return constraints;
}

function filterWords(pool,constraints,fallback){
  if(!constraints) return pool;
  const f=pool.filter(w=>w.wt>=constraints.wt[0]&&w.wt<=constraints.wt[1]&&w.tp>=constraints.tp[0]&&w.tp<=constraints.tp[1]&&w.rs>=constraints.rs[0]&&w.rs<=constraints.rs[1]);
  return f.length>0?f:(fallback||pool);
}

function pickWord(pool){return pool[Math.floor(Math.random()*pool.length)].w;}

function maxComplexityFromMomentum(momentum,role){
  const abs=Math.abs(momentum);
  let max=6;
  if(abs>0.15) max=1;
  else if(abs>0.08) max=3;
  if(role==='RESOLUTION') max=Math.min(max,2);
  if(role==='CONTRAST')   max=Math.min(max,2);
  return max;
}

function compose(voiceNote, remainder, spinePos, momentum, role, vCfg) {
  const cosmo=COSMOLOGY[voiceNote];
  let structs=STRUCTURES.filter(s=>s.notes.includes(voiceNote));
  // Bass prefers simpler structures
  const complexityBias = vCfg.id==='bass'?-1:vCfg.id==='color'?0:0;
  const maxC=Math.min(cosmo.maxComplexity, maxComplexityFromMomentum(momentum,role)+complexityBias);
  structs=structs.filter(s=>s.complexity<=Math.max(0,maxC));
  if(!structs.length){
    const soloPool=WORD_FIELD.solo.filter(w=>w.note===voiceNote||w.note==='A');
    return soloPool.length?pickWord(soloPool):'—';
  }
  let constraints=computePhonemeConstraints(remainder,spinePos);
  constraints=biasConstraintsForRole(constraints,role);
  const struct=structs[Math.floor(Math.pow(Math.random(),1.4)*structs.length)];
  const parts=struct.slots.map(slot=>{
    switch(slot){
      case 'SOLO':{const p=WORD_FIELD.solo.filter(w=>w.note===voiceNote||w.note==='A');return pickWord(filterWords(p,constraints,p));}
      case 'S':   return pickWord(filterWords(WORD_FIELD.subjects,   constraints,WORD_FIELD.subjects));
      case 'Vi':  return pickWord(filterWords(WORD_FIELD.verbs_i,    constraints,WORD_FIELD.verbs_i));
      case 'Vt':  return pickWord(filterWords(WORD_FIELD.verbs_t,    constraints,WORD_FIELD.verbs_t));
      case 'O':   return pickWord(filterWords(WORD_FIELD.objects,    constraints,WORD_FIELD.objects));
      case 'Adv': return pickWord(filterWords(WORD_FIELD.adverbials, constraints,WORD_FIELD.adverbials));
      case 'Sub': return pickWord(filterWords(WORD_FIELD.subordinates,constraints,WORD_FIELD.subordinates));
      default: return '';
    }
  });
  return parts.filter(Boolean).join(' ');
}

function selectVoice(remainder, v) {
  if(!remainder.length) return null;
  const sNote=spineNote(v), sIdx=COSMOLOGY[sNote].idx;
  const centroid=remainder.reduce((s,n)=>s+COSMOLOGY[n].idx,0)/remainder.length;
  const sigNote=signalNote(centroid), sigIdx=COSMOLOGY[sigNote].idx;
  if(remainder.includes('G')&&v.spine.pos>=5.5) return {note:'G',big:true,pair:null};
  if(sNote===sigNote) return {note:sNote,big:v.spine.momentum>0.08,pair:null};
  if(sigIdx>sIdx) return {note:sigNote,big:false,pair:[sNote,sigNote]};
  if(sigIdx<sIdx&&v.spine.momentum>-0.05) return {note:sNote,big:false,pair:null};
  return {note:sigNote,big:false,pair:[sigNote,sNote]};
}

function applyClimbPressure(note, v){
  v.recentSpeaks.push(note); if(v.recentSpeaks.length>5) v.recentSpeaks.shift();
  NOTE_ORDER.forEach(n=>{v.noteThreshBoost[n]=Math.max(0,(v.noteThreshBoost[n]||0)*0.93);});
  if(v.recentSpeaks.filter(n=>n===note).length>=3) v.noteThreshBoost[note]=(v.noteThreshBoost[note]||0)+0.016;
}

// ── INSTRUMENTS — RODS NOT NOTES ─────────────────────────
const NOTE_FREQ={A:220.00,B:261.63,C:293.66,D:329.63,E:391.99,F:440.00,G:523.25};
const CHIME_FREQ={A:880.0,B:1046.5,C:1174.7,D:1318.5,E:1567.9,F:1760.0,G:2093.0};
const NAND_COMPLEMENT={A:'D',B:'E',C:'F',D:'G',E:'A',F:'B',G:'C'};
let instruments_on=true;

function rodFreq(f1,f2){return Math.sqrt(f1*f2);}

function playVoice(freq,env,gain_scale,now,detune,dur_scale){
  if(!audioCtx) return;
  const osc=audioCtx.createOscillator(),g=audioCtx.createGain();
  osc.type='sine'; osc.frequency.setValueAtTime(freq*(detune||1.0),now);
  const gv=env.gain*gain_scale;
  g.gain.setValueAtTime(0,now);
  g.gain.linearRampToValueAtTime(gv,now+env.attack);
  g.gain.linearRampToValueAtTime(gv*env.sustain,now+env.attack+env.decay);
  g.gain.setValueAtTime(gv*env.sustain,now+env.attack+env.decay+0.05);
  const dur=(env.attack+env.decay+0.05+env.release)*(dur_scale||1.0);
  g.gain.exponentialRampToValueAtTime(0.0001,now+dur);
  osc.connect(g);g.connect(audioCtx.destination);
  osc.start(now);osc.stop(now+dur+0.05);
  // Hammer
  const b=audioCtx.createOscillator(),bg=audioCtx.createGain();
  b.type='sine';b.frequency.setValueAtTime(freq*3.0*(detune||1.0),now);
  bg.gain.setValueAtTime(0,now);bg.gain.linearRampToValueAtTime(gv*0.04,now+0.004);
  bg.gain.exponentialRampToValueAtTime(0.0001,now+0.10);
  b.connect(bg);bg.connect(audioCtx.destination);b.start(now);b.stop(now+0.12);
}

function makeReverb(srcGain,now,dt,wet){
  if(!audioCtx) return;
  const d=audioCtx.createDelay(1.0),dg=audioCtx.createGain();
  d.delayTime.setValueAtTime(dt,now);dg.gain.setValueAtTime(wet,now);
  srcGain.connect(d);d.connect(dg);dg.connect(audioCtx.destination);
}

function playChord(note,role,big,pair,vCfg){
  if(!instruments_on||!audioCtx) return;
  const now=audioCtx.currentTime;
  const gs=vCfg.gainScale, os=vCfg.octaveShift;
  const envMap={
    CALL:        {attack:0.06,decay:0.30,sustain:0.45,release:1.4,gain:0.15*gs},
    DEVELOPMENT: {attack:0.04,decay:0.20,sustain:0.50,release:1.0,gain:0.16*gs},
    CONTRAST:    {attack:0.01,decay:0.15,sustain:0.40,release:0.8,gain:0.20*gs},
    RESOLUTION:  {attack:0.10,decay:0.50,sustain:0.30,release:2.4,gain:0.13*gs},
  };
  const env=envMap[role]||envMap['CALL'];
  if(big) env.gain*=1.4;

  // G chord — wide voicing
  if(note==='G'){
    const f=NOTE_FREQ['G']*os;
    const ge={...env,release:env.release*1.8,gain:env.gain*0.9};
    playVoice(f*0.5,ge,0.7,now,1.000,1.0);
    playVoice(f*0.75,ge,0.5,now,1.001,0.9);
    playVoice(f,ge,0.6,now,1.000,1.1);
    playVoice(f*1.25,ge,0.3,now+0.04,0.999,0.8);
    return;
  }

  // Pair chord — two serpents + rod
  if(pair&&pair.length===2){
    const f1=NOTE_FREQ[pair[0]]*os, f2=NOTE_FREQ[pair[1]]*os;
    if(!f1||!f2) return;
    const fRod=rodFreq(f1,f2);
    playVoice(f1,env,0.8,now,1.000,1.0);
    playVoice(f2,env,0.8,now+0.02,1.001,1.0);
    const rodEnv={...env,attack:env.attack*1.8,gain:env.gain*0.55};
    playVoice(fRod,rodEnv,1.0,now+0.035,1.0,1.1);
    // Rod reverb
    const ro=audioCtx.createOscillator(),rg=audioCtx.createGain();
    ro.type='sine';ro.frequency.setValueAtTime(fRod,now);
    rg.gain.setValueAtTime(0,now);rg.gain.linearRampToValueAtTime(env.gain*0.08,now+env.attack*2);
    rg.gain.exponentialRampToValueAtTime(0.0001,now+env.attack+env.decay+env.release*1.3);
    ro.connect(rg);makeReverb(rg,now,0.28,0.18);rg.connect(audioCtx.destination);
    ro.start(now);ro.stop(now+env.attack+env.decay+env.release*1.4);
    return;
  }

  // Solo — note + NAND complement
  const f1=NOTE_FREQ[note]*os;
  const comp=NAND_COMPLEMENT[note];
  const f2=(NOTE_FREQ[comp]||f1*1.5)*os;
  const fRod=rodFreq(f1,f2);
  playVoice(f1,env,0.9,now,1.000,1.0);
  playVoice(f2,env,0.5,now+0.01,1.001,0.85);
  const ro=audioCtx.createOscillator(),rg=audioCtx.createGain();
  ro.type='triangle';ro.frequency.setValueAtTime(fRod,now+0.025);
  rg.gain.setValueAtTime(0,now);rg.gain.linearRampToValueAtTime(env.gain*0.45,now+env.attack*1.5);
  rg.gain.linearRampToValueAtTime(env.gain*0.45*env.sustain,now+env.attack+env.decay);
  rg.gain.exponentialRampToValueAtTime(0.0001,now+env.attack+env.decay+env.release);
  ro.connect(rg);makeReverb(rg,now,0.20,0.14);rg.connect(audioCtx.destination);
  ro.start(now+0.02);ro.stop(now+env.attack+env.decay+env.release+0.1);
}

function playChime(note,energy_level,os){
  if(!instruments_on||!audioCtx) return;
  const freq=(CHIME_FREQ[note]||1000)*(os||1.0);
  const now=audioCtx.currentTime;
  const vol=0.03+energy_level*0.05;
  const osc=audioCtx.createOscillator(),g=audioCtx.createGain();
  osc.type='sine';osc.frequency.setValueAtTime(freq*(0.998+Math.random()*0.004),now);
  g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(vol,now+0.004);
  g.gain.exponentialRampToValueAtTime(vol*0.3,now+0.06);
  g.gain.exponentialRampToValueAtTime(0.0001,now+1.2+Math.random()*0.6);
  const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
  o2.type='sine';o2.frequency.setValueAtTime(freq*1.618,now);
  g2.gain.setValueAtTime(0,now);g2.gain.linearRampToValueAtTime(vol*0.3,now+0.006);
  g2.gain.exponentialRampToValueAtTime(0.0001,now+0.6);
  osc.connect(g);g.connect(audioCtx.destination);
  o2.connect(g2);g2.connect(audioCtx.destination);
  osc.start(now);osc.stop(now+2.0);
  o2.start(now);o2.stop(now+0.7);
}

function scatterChimes(remainder,energy_level,v){
  if(!instruments_on||!audioCtx||!listening) return;
  if(energy_level<0.018) return;
  v.chimeScatterFrame++;
  if(v.chimeScatterFrame%4!==0) return;
  remainder.forEach(n=>{
    const throttle=200+Math.floor(Math.random()*120);
    if(animFrame-(v.lastChimeFrame[n]||0)<throttle) return;
    const cosmo=COSMOLOGY[n];
    const prob=cosmo?(cosmo.tp[0]+cosmo.tp[1])/2*energy_level*4.0:0;
    if(Math.random()<prob){
      playChime(n,energy_level,v.cfg.octaveShift);
      v.lastChimeFrame[n]=animFrame;
    }
  });
}

// ── VAGUS NERVE — gut to brain ────────────────────────────
// Crystallized phrases travel up the nerve to ohai_server.
// The brain breathes them as self-initiated inhales.
// The remainder returns as a fourth voice — no author.
const VAGUS_SERVER = 'http://localhost:7700';
const vagus = {
  cooldown: 0,          // frame of last transmission
  COOLDOWN_FRAMES: 180, // minimum frames between transmissions (~3s at 60fps)
  pending: false,
  // G-state crystallizations and high-spine RESOLUTIONs travel up the nerve.
  // Low-energy or mid-range phrases compost back into the field silently.
  shouldSend(note, role, energy) {
    if(animFrame - this.cooldown < this.COOLDOWN_FRAMES) return false;
    if(this.pending) return false;
    // G-state always travels — it's a grace event
    if(note === 'G') return true;
    // High-spine RESOLUTION — the phrase completed an arc
    if(role === 'RESOLUTION' && ['E','F'].includes(note)) return true;
    // Stable DEVELOPMENT at high energy — sustained coherence
    if(role === 'DEVELOPMENT' && ['D','E'].includes(note) && energy > 0.06) return true;
    return false;
  },
  async send(text, note, voice, role, remainder, energy) {
    if(!this.shouldSend(note, role, energy)) return;
    this.cooldown = animFrame;
    this.pending  = true;
    try {
      const res = await fetch(`${VAGUS_SERVER}/vagus`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ text, note, voice, role, remainder, energy }),
      });
      if(!res.ok) { this.pending = false; return; }
      const data = await res.json();
      this.pending = false;
      // Brain responded — display as fourth voice in bass chronicle
      if(data.reply && data.reply !== '...') {
        vagusEcho(data.reply, data.position || 'C', data.has_g || false);
      }
    } catch(_) {
      // ohai_server not running — silent. Gut doesn't panic when brain is asleep.
      this.pending = false;
    }
  }
};

function vagusEcho(reply, position, hasG) {
  // The brain's remainder displayed in the bass chronicle as ∿ (vagus glyph)
  // No voice attribution. No role. It arrived from the nerve.
  const cosmo = COSMOLOGY[position] || COSMOLOGY['C'];
  const color  = cosmo.color;
  const v      = voices.bass;
  const el     = document.createElement('div');
  el.className = `entry${hasG?' G':''}`;
  const e  = Math.floor((Date.now() - sessionStart) / 1000);
  const mm = String(Math.floor(e/60)).padStart(2,'0');
  const ss = String(e%60).padStart(2,'0');
  el.innerHTML = `<span class="entry-time">${mm}:${ss}</span>`
    + `<span class="entry-note" style="color:${color}">∿</span>`
    + `<span class="entry-role" style="color:${color};opacity:0.4">vagus</span>`
    + `<span class="entry-text" style="color:${color};`
    + `text-shadow:0 0 12px ${color}44;font-style:italic">`
    + reply.toUpperCase() + `</span>`;
  el.style.opacity = '0';
  document.getElementById('chronicle-bass').appendChild(el);
  requestAnimationFrame(() => {
    el.style.transition = 'opacity 1.2s ease';
    el.style.opacity = '1';
  });
  v.entries.push({el, note: position, frame: animFrame});
  while(v.entries.length > 12) {
    const old = v.entries.shift();
    old.el.classList.add('fading');
    setTimeout(() => old.el.remove(), 1600);
  }
  // Update ensemble state to show vagus activity
  document.getElementById('ensemble-state').textContent =
    `∿ vagus · ${position} · resonating`;
}

// ── SPEAK — per voice ─────────────────────────────────────
function speak(v, text, note, big, pair, role){
  if(!text||v.currentLocked) return;
  v.currentLocked=true; v.lastSpeakFrame=animFrame;
  applyClimbPressure(note,v);
  updateJazzState(v,note,role||'CALL',text);
  playChord(note,role||'CALL',big,pair,v.cfg);

  // ── VAGUS: crystallized phrase travels up the nerve ───
  // Fire-and-forget. The response comes back asynchronously as vagusEcho().
  const remStr = v.remainderBuffer.length ? v.remainderBuffer[v.remainderBuffer.length-1] : '';
  vagus.send(text, note, v.cfg.id, role||'CALL', remStr, v.energy);

  // Push to ensemble memory
  ensemble.push({voiceId:v.cfg.id, note, role, text, frame:Date.now()});

  const cosmo=COSMOLOGY[note], color=cosmo?cosmo.color:'#fff';
  const el=document.getElementById('current-'+v.cfg.id);
  const roleEl=document.getElementById('role-'+v.cfg.id);
  el.style.color=color; el.style.textShadow=`0 0 28px ${color}55`;
  el.textContent=text.toUpperCase(); el.style.opacity='1';
  roleEl.textContent=role||''; roleEl.style.color=color; roleEl.style.opacity='1';

  // Highlight speaking panel
  const panel=document.getElementById('panel-'+v.cfg.id);
  panel.classList.add('speaking');
  panel.style.color=color;

  clearTimeout(v.currentTimer);
  const hold=note==='G'?6000:big?3500:2200;
  v.currentTimer=setTimeout(()=>{
    el.style.opacity='0'; roleEl.style.opacity='0';
    panel.classList.remove('speaking');
    setTimeout(()=>{v.currentLocked=false; addEntry(v,text,note,big,pair,role);},500);
  },hold);

  totalObs++;
  document.getElementById('obs-count').textContent=totalObs;
}

function addEntry(v,text,note,big,pair,role){
  if(!text||!text.trim()) return;
  const el=document.createElement('div');
  el.className=`entry${big?' big':''} ${note}`;
  const e=Math.floor((Date.now()-sessionStart)/1000);
  const mm=String(Math.floor(e/60)).padStart(2,'0'),ss=String(e%60).padStart(2,'0');
  const c=COSMOLOGY[note]?COSMOLOGY[note].color:'#fff';
  const nl=pair?pair.join('⟷'):note;
  el.innerHTML=`<span class="entry-time">${mm}:${ss}</span><span class="entry-note" style="color:${c}">${nl}</span><span class="entry-role">${role||''}</span><span class="entry-text" style="color:${c};text-shadow:0 0 ${big?18:6}px ${c}28">${text.toUpperCase()}</span>`;
  el.style.opacity='0';
  document.getElementById('chronicle-'+v.cfg.id).appendChild(el);
  requestAnimationFrame(()=>{el.style.transition='opacity 0.7s ease';el.style.opacity='1';});
  v.entries.push({el,note,frame:animFrame});
  const maxEntries=v.cfg.id==='bass'?10:v.cfg.id==='piano'?12:16;
  while(v.entries.length>maxEntries){const old=v.entries.shift();old.el.classList.add('fading');setTimeout(()=>old.el.remove(),1600);}
}

// ── THINK — per voice ─────────────────────────────────────
function think(v){
  if(!listening) return;
  const state=quantize(v);
  const meshOut=runNandMesh(state,v);
  const remainder=getRemainder(meshOut);
  v.nandCycle++; v.meshRotation=(v.meshRotation+1)%N;
  NOTE_ORDER.forEach(n=>{v.noteThreshBoost[n]=Math.max(0,(v.noteThreshBoost[n]||0)*0.997);});

  const hasSignal=remainder.length>0&&v.energy>0.010;
  const centroid=hasSignal?remainder.reduce((s,n)=>s+COSMOLOGY[n].idx,0)/remainder.length:v.spine.pos*0.97;
  updateSpine(v,centroid,hasSignal);
  scatterChimes(remainder,v.energy,v);

  if(v.energy<0.010) v.silenceFrames++;
  else{v.silenceFrames=0;v.silenceSpoken=false;}

  // NAND display
  const inp=NOTE_ORDER.map(n=>state[n]?n:'·').join('');
  const out=NOTE_ORDER.map(n=>meshOut[n]?n:'·').join('');
  const rem=remainder.length>0?remainder.join(''):'∅';
  document.getElementById(v.cfg.id+'-nand').textContent=
    `[${inp}]→[${out}] ${rem} S:${v.spine.pos.toFixed(1)} T:${v.jazz.tension.toFixed(2)} ${v.jazz.role}`;

  if(v.currentLocked) return;
  if(animFrame-v.lastSpeakFrame<v.currentWait) return;

  if(v.silenceFrames>300&&!v.silenceSpoken){
    const sn=spineNote(v);
    const text=compose(sn,[],v.spine.pos,0,'RESOLUTION',v.cfg);
    if(text) speak(v,text,sn,false,null,'RESOLUTION');
    v.silenceSpoken=true; return;
  }

  if(!checkStability(remainder,v)||!remainder.length) return;
  v.remainderBuffer=[];
  let voice=selectVoice(remainder,v);
  if(!voice) return;

  const forceContrast=v.jazz.modeFrames>v.jazz.MODE_LIMIT;
  const role=nextRole(v,remainder,forceContrast);
  v.jazz.role=role;
  voice=applyJazzIntent(voice,role,v);
  v.currentWait=rhythmicWait(role,v);

  let text=compose(voice.note,remainder,v.spine.pos,v.spine.momentum,role,v.cfg);
  if(text===v.lastText) text=compose(voice.note,remainder,v.spine.pos,v.spine.momentum,role,v.cfg);
  if(!text||!text.trim()) return;
  v.lastText=text;
  speak(v,text,voice.note,voice.big,voice.pair||null,role);
}

// ── SPINE VISUAL — driven by bass spine ──────────────────
function updateSpineVisual(){
  const v=voices.bass;
  NOTE_ORDER.forEach((n,i)=>{
    const node=document.getElementById(`sn-${n}`);if(!node) return;
    const dist=Math.abs(i-v.spine.pos),c=COSMOLOGY[n].color;
    if(dist<0.8) node.style.cssText=`width:7px;height:7px;border-radius:50%;border:1px solid ${c};background:${c};box-shadow:0 0 8px ${c}99;transform:scale(1.5);opacity:1;transition:all 0.6s ease;`;
    else if(dist<1.6) node.style.cssText=`width:7px;height:7px;border-radius:50%;border:1px solid ${c}55;background:transparent;transform:scale(1.1);opacity:0.4;transition:all 0.6s ease;`;
    else node.style.cssText=`width:7px;height:7px;border-radius:50%;border:1px solid rgba(255,255,255,0.08);background:transparent;transform:scale(1);opacity:0.18;transition:all 0.6s ease;`;
  });
}

// ── BACKGROUND ────────────────────────────────────────────
function drawBackground(){
  bgCtx.clearRect(0,0,W,H);
  if(!listening) return;
  // Three subtle radial glows — one per voice, positioned at column thirds
  const vArr=[voices.bass, voices.piano, voices.color];
  const xPos=[W*0.2, W*0.5, W*0.8];
  vArr.forEach((v,i)=>{
    const cosmo=COSMOLOGY[spineNote(v)];
    if(!cosmo||v.energy<0.008) return;
    const brightness=v.spine.pos/6.0;
    const alpha=(v.energy+brightness*0.04)*0.12*(1+v.jazz.tension*0.4);
    const r=W*0.2+brightness*W*0.1;
    const grd=bgCtx.createRadialGradient(xPos[i],H*0.5,0,xPos[i],H*0.5,r);
    grd.addColorStop(0,hexToRgba(cosmo.color,alpha));
    grd.addColorStop(1,'rgba(0,0,0,0)');
    bgCtx.fillStyle=grd;bgCtx.fillRect(0,0,W,H);
  });
  // Waveform on left edge
  bgCtx.save();bgCtx.globalAlpha=0.14+globalEnergy*0.22;bgCtx.beginPath();
  for(let i=0;i<128;i++){const y=(i/128)*H,x=W*0.035+waveform[i]*W*0.025*(1+globalEnergy*2);i===0?bgCtx.moveTo(x,y):bgCtx.lineTo(x,y);}
  bgCtx.strokeStyle=COSMOLOGY[spineNote(voices.bass)].color;bgCtx.lineWidth=1.2;bgCtx.stroke();bgCtx.restore();
}

function hexToRgba(hex,alpha){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── CONTROLS ─────────────────────────────────────────────
function toggleInstruments(){
  instruments_on=!instruments_on;
  const btn=document.getElementById('instr-btn');
  btn.textContent=instruments_on?'♪ instruments on':'♪ instruments off';
  btn.classList.toggle('active',instruments_on);
}

function clearAll(){
  Object.values(voices).forEach(v=>{v.entries.forEach(e=>e.el.remove());v.entries=[];});
  ensemble.recentPhrases=[];
}

// ── ENSEMBLE STATE DISPLAY ────────────────────────────────
function updateEnsembleState(){
  const recent=ensemble.recentPhrases;
  if(!recent.length){document.getElementById('ensemble-state').textContent='ensemble idle';return;}
  const last=recent[recent.length-1];
  const prev=recent.length>1?recent[recent.length-2]:null;
  let state=`${last.voiceId} · ${last.role}`;
  if(prev&&prev.voiceId!==last.voiceId) state+=` ← ${prev.voiceId}`;
  document.getElementById('ensemble-state').textContent=state;
}

// ── MAIN LOOP ────────────────────────────────────────────
setInterval(()=>{
  const e=Math.floor((Date.now()-sessionStart)/1000);
  document.getElementById('timer').textContent=String(Math.floor(e/60)).padStart(2,'0')+':'+String(e%60).padStart(2,'0');
},1000);

function loop(){
  analyzeAudio();
  think(voices.bass);
  think(voices.piano);
  think(voices.color);
  drawBackground();
  updateSpineVisual();
  if(animFrame%30===0) updateEnsembleState();
  animFrame++;
  requestAnimationFrame(loop);
}
loop();
</script>
